<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tasklist</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; background: Canvas; color: CanvasText; }
  header { padding: 12px 20px; border-bottom: 1px solid #8884; display: flex; gap: 16px; align-items: center; }
  h1 { font-size: 18px; margin: 0; }
  .banner { background: #c0392b; color: #fff; padding: 6px 20px; font-size: 13px; display: none; align-items: center; justify-content: space-between; gap: 12px; }
  .banner-x { background: transparent; border: 0; color: #fff; font: inherit; font-size: 15px; line-height: 1; cursor: pointer; opacity: .8; padding: 2px 6px; }
  .banner-x:hover { opacity: 1; }
  main { max-width: 820px; margin: 0 auto; padding: 20px; }
  .task { border: 1px solid #8884; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
  .task.done { opacity: .55; }
  .row { display: flex; gap: 10px; align-items: flex-start; }
  .title { font-weight: 600; flex: 1; }
  .src a { font-size: 12px; color: #4a90d9; text-decoration: none; }
  .thread { margin: 10px 0 0 26px; border-left: 2px solid #8884; padding-left: 10px; }
  .meta { font-size: 11px; opacity: .6; margin: 2px 0; }
  .meta.slack { color: #4a90d9; }
  .meta.agent { color: #7c5cbf; }
  .cmt { margin: 6px 0; }
  .cmt .who { font-weight: 600; font-size: 12px; text-transform: uppercase; opacity: .7; }
  .cmt.agent .who { color: #27ae60; }
  .cmt .body { margin-top: 2px; }
  .cmt .body > *:first-child { margin-top: 0; }
  .cmt .body > *:last-child { margin-bottom: 0; }
  .cmt .body p { margin: 6px 0; }
  .cmt .body .md-h { font-size: 14px; margin: 10px 0 4px; line-height: 1.3; }
  .cmt .body ul, .cmt .body ol { margin: 6px 0; padding-left: 22px; }
  .cmt .body li { margin: 2px 0; }
  .cmt .body blockquote { margin: 6px 0; padding: 2px 0 2px 10px; border-left: 2px solid #8886; opacity: .85; }
  .cmt .body code { background: #8882; border-radius: 4px; padding: 1px 4px; font: 12.5px/1.4 ui-monospace, Menlo, monospace; }
  .cmt .body pre { background: #8881; border-radius: 6px; padding: 8px 10px; overflow-x: auto; margin: 6px 0; }
  .cmt .body pre code { background: none; padding: 0; }
  .cmt .body hr { border: 0; border-top: 1px solid #8884; margin: 8px 0; }
  .cmt .body a { color: #4a90d9; }
  form.add { margin-top: 8px; display: flex; gap: 6px; }
  input[type=text] { flex: 1; padding: 6px 8px; border: 1px solid #8886; border-radius: 6px; background: Field; color: FieldText; }
  button { padding: 6px 10px; border: 1px solid #8886; border-radius: 6px; background: ButtonFace; color: ButtonText; cursor: pointer; }
  .spin { font-size: 12px; color: #27ae60; }
  .tabs button.active { font-weight: 700; text-decoration: underline; }
  .pill { font-size: 11px; padding: 2px 6px; border-radius: 10px; border: 1px solid #8886; margin-left: 6px; }
  .pill.executing, .pill.diagnosing { color: #d68910; } .pill.done { color: #27ae60; } .pill.failed { color: #c0392b; }
  .agentbar { margin: 8px 0 0 26px; display: flex; gap: 6px; align-items: center; }
  #console { border-bottom: 1px solid #8884; background: #0001; }
  #console .chead { display: flex; align-items: center; gap: 10px; padding: 6px 20px; font-size: 13px; }
  #console .dot { color: #d68910; } #console .dot.done { color: #27ae60; } #console .dot.failed { color: #c0392b; }
  #console .close { margin-left: auto; cursor: pointer; border: 1px solid #8886; border-radius: 6px; padding: 1px 8px; }
  #conlog { margin: 0; padding: 0 20px 10px 20px; max-height: 260px; overflow: auto;
    font: 12px/1.5 ui-monospace, Menlo, monospace; white-space: pre-wrap; word-break: break-word; }
  #conlog .tool { color: #4a90d9; } #conlog .result { opacity: .75; } #conlog .stderr { color: #c0392b; }
  #conlog .done { color: #27ae60; } #conlog .start { opacity: .7; }
  .runs { display: inline-flex; flex-wrap: wrap; gap: 4px; margin-left: 6px; vertical-align: middle; }
  .runrow { font-size: 11px; padding: 2px 6px; }
  #activity { cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>tasklist</h1>
  <span class="tabs">
    <button data-status="open" class="active">Open</button>
    <button data-status="done">Done</button>
    <button data-status="all">All</button>
  </span>
  <span class="runjobs" style="margin-left:auto;display:flex;gap:6px;align-items:center;">
    <button id="run-ingest" onclick="runJob('ingest', this)">Pull Slack</button>
    <button id="run-digest" onclick="runJob('digest', this)">Run digest</button>
    <span id="jobstatus" style="font-size:12px;opacity:.7;"></span>
  </span>
  <span id="activity" style="font-size:12px;color:#d68910;" title="Watch a running agent" onclick="watchNewestActive()"></span>
  <a href="/repos.html" style="color:#4a90d9;font-size:13px;">Repos</a>
  <span id="usage" style="font-size:12px;opacity:.7;"></span>
</header>
<div class="banner" id="banner"><span id="bannermsg"></span><button type="button" class="banner-x" title="Dismiss" onclick="dismissBanner()">✕</button></div>
<div class="banner" id="budgetbanner" style="background:#b7791f;"><span id="budgetmsg"></span><button type="button" class="banner-x" title="Dismiss" onclick="dismissBudgetBanner()">✕</button></div>
<div id="console" hidden>
  <div class="chead">
    <span class="dot" id="condot">●</span>
    <strong id="contitle">run</strong>
    <span id="constatus" style="opacity:.7;"></span>
    <span class="close" onclick="closeConsole()">close</span>
  </div>
  <pre id="conlog"></pre>
</div>
<main id="list">Loading…</main>
<script>
let status = 'open';
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
// Minimal, self-contained Markdown → HTML for agent comment bodies. Escapes first,
// then applies a small block/inline grammar (headings, lists, quotes, code, bold/
// italic/links). No external deps — the page stays offline/CSP-safe.
function mdInline(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^\w*])\*([^*\n]+)\*(?!\w)/g, '$1<em>$2</em>');
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
function mdToHtml(src) {
  const lines = String(src ?? '').replace(/\r\n?/g, '\n').split('\n');
  const out = [];
  let listType = null, para = [], inCode = false, code = [];
  const flushPara = () => { if (para.length) { out.push(`<p>${para.map(mdInline).join('<br>')}</p>`); para = []; } };
  const closeList = () => { if (listType) { out.push(`</${listType}>`); listType = null; } };
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, '');
    if (/^```/.test(line)) {
      if (inCode) { out.push(`<pre><code>${code.map(esc).join('\n')}</code></pre>`); code = []; inCode = false; }
      else { flushPara(); closeList(); inCode = true; }
      continue;
    }
    if (inCode) { code.push(raw); continue; }
    if (!line.trim()) { flushPara(); closeList(); continue; }
    let m;
    if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
      flushPara(); closeList();
      const n = m[1].length; out.push(`<h${n} class="md-h">${mdInline(m[2])}</h${n}>`); continue;
    }
    if (/^\s*([-*+])\s+/.test(line)) {
      flushPara(); if (listType !== 'ul') { closeList(); out.push('<ul>'); listType = 'ul'; }
      out.push(`<li>${mdInline(line.replace(/^\s*[-*+]\s+/, ''))}</li>`); continue;
    }
    if (/^\s*\d+\.\s+/.test(line)) {
      flushPara(); if (listType !== 'ol') { closeList(); out.push('<ol>'); listType = 'ol'; }
      out.push(`<li>${mdInline(line.replace(/^\s*\d+\.\s+/, ''))}</li>`); continue;
    }
    if ((m = line.match(/^\s*>\s?(.*)$/))) {
      flushPara(); closeList(); out.push(`<blockquote>${mdInline(m[1])}</blockquote>`); continue;
    }
    if (/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)) { flushPara(); closeList(); out.push('<hr>'); continue; }
    closeList(); para.push(line);
  }
  if (inCode) out.push(`<pre><code>${code.map(esc).join('\n')}</code></pre>`);
  flushPara(); closeList();
  return out.join('');
}
// Timestamps from the API are SQLite datetime('now') strings — UTC, no zone marker.
// Append 'Z' so the browser parses them as UTC, then render in the viewer's local zone.
const asUTC = (s) => new Date(String(s).replace(' ', 'T') + 'Z');
const localDateTime = (s) => s ? asUTC(s).toLocaleString() : '';
const localTime = (s) => s ? asUTC(s).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

// The failed run currently reflected in the banner, keyed by finished_at so a
// dismissal sticks for that failure only — a newer failure re-surfaces the banner.
let lastIngestFail = null;
function dismissBanner() {
  if (lastIngestFail != null) localStorage.setItem('ingestBannerDismissed', lastIngestFail);
  document.getElementById('banner').style.display = 'none';
}
function dismissBudgetBanner() {
  localStorage.setItem('budgetBannerDismissed', new Date().toDateString());
  document.getElementById('budgetbanner').style.display = 'none';
}

async function loadStatusBanner() {
  const s = await (await fetch('/api/status')).json();
  const b = document.getElementById('banner');
  const bad = s.ingest && s.ingest.status === 'failed';
  lastIngestFail = bad ? (s.ingest.finished_at || '') : null;
  const show = bad && localStorage.getItem('ingestBannerDismissed') !== lastIngestFail;
  b.style.display = show ? 'flex' : 'none';
  if (show) document.getElementById('bannermsg').textContent = 'Last Slack ingest failed — ' + localDateTime(s.ingest.finished_at);
  const fmt = (r) => r ? `${r.status}${r.finished_at ? ' · ' + localTime(r.finished_at) : ''}` : '—';
  document.getElementById('jobstatus').textContent =
    `ingest: ${fmt(s.ingest)} · digest: ${fmt(s.digest)}`;
  const u = await (await fetch('/api/usage')).json();
  const t = u.today.total;
  const tok = (t.input_tokens + t.output_tokens);
  const dollars = t.cost_usd ? `${t.cost_estimated ? '~$' : '$'}${t.cost_usd.toFixed(2)}${t.cost_estimated ? ' est.' : ''}` : '$0.00';
  document.getElementById('usage').textContent = `agents: ${u.active}/${u.cap} · ${dollars} · ${tok.toLocaleString()} tok today`;
  const bb = document.getElementById('budgetbanner');
  const showBudget = u.budget.over && localStorage.getItem('budgetBannerDismissed') !== new Date().toDateString();
  bb.style.display = showBudget ? 'flex' : 'none';
  if (showBudget) document.getElementById('budgetmsg').textContent =
    `Today's est. spend ${dollars} exceeds your $${u.budget.daily_usd} budget. Scheduled jobs are still running.`;
  // Activity indicator: what's running now (any kind), clickable to watch.
  try {
    const runs = await (await fetch('/api/runs/active')).json();
    window._activeRuns = runs;
    document.getElementById('activity').textContent =
      runs.length ? '▶ ' + runs.map((r) => r.kind + (r.task_id ? ' #' + r.task_id : '')).join(', ') : '';
  } catch { /* offline — leave prior text */ }
}

function watchNewestActive() {
  const runs = window._activeRuns || [];
  if (runs.length) openConsole(runs[0].id, runs[0].kind + (runs[0].task_id ? ' #' + runs[0].task_id : ''));
}

async function runJob(job, btn) {
  const label = btn.textContent;
  btn.disabled = true;
  btn.textContent = job === 'ingest' ? 'Pulling…' : 'Running…';
  try {
    await fetch('/api/run/' + job, { method: 'POST', headers: { 'content-type': 'application/json' }, body: '{}' });
  } catch (e) { /* status label reflects real run state on next poll */ }
  // The run row is created just after this fire-and-forget trigger; resolve its
  // runId from the active list, then open the console on it.
  watchLatest(job, job === 'ingest' ? 'Slack pull' : 'Digest');
  setTimeout(() => { btn.disabled = false; btn.textContent = label; loadStatusBanner(); }, 1500);
}

// Poll /api/runs/active briefly until the just-triggered job's run appears, then watch it.
async function watchLatest(kind, title) {
  for (let i = 0; i < 20; i++) {
    try {
      const active = await (await fetch('/api/runs/active')).json();
      const run = active.find((r) => r.kind === kind);
      if (run) return openConsole(run.id, title);
    } catch { /* retry */ }
    await new Promise((r) => setTimeout(r, 250));
  }
}

// Task ids whose run-history list is expanded. render() rebuilds #list wholesale
// (wiping injected HTML), so we re-populate these after every render.
const openRuns = new Set();

// Open the live console for a task's active run if one is running; otherwise toggle
// its run history so a finished run can be reopened.
async function watchTask(id) {
  let active = [];
  try { active = await (await fetch('/api/runs/active')).json(); } catch { /* offline */ }
  const run = active.find((r) => r.task_id === id);
  if (run) { openConsole(run.id, 'task ' + id + ' · ' + run.kind); return; }
  if (openRuns.has(id)) { openRuns.delete(id); const el = document.getElementById('runs-' + id); if (el) el.innerHTML = ''; }
  else { openRuns.add(id); loadRuns(id); }
}

// Render a task's recent runs (kind · status · cost · time); each row reopens its
// persisted trace in the console.
async function loadRuns(id) {
  const el = document.getElementById('runs-' + id);
  if (!el) return;
  let runs = [];
  try { runs = await (await fetch('/api/tasks/' + id + '/runs')).json(); } catch { /* offline */ }
  if (!runs.length) { el.innerHTML = '<span style="opacity:.6;font-size:11px;">no runs yet</span>'; return; }
  el.innerHTML = runs.map((r) => {
    const cost = r.cost_usd != null ? `${r.cost_estimated ? '~$' : '$'}${Number(r.cost_usd).toFixed(4)}` : '';
    const label = `${esc(r.kind)} · ${esc(r.status)}${cost ? ' · ' + cost : ''} · ${localTime(r.started_at)}`;
    return `<button class="runrow" onclick="openConsole(${r.id}, 'run ${r.id} · ${esc(r.kind)}')">${label}</button>`;
  }).join('');
}

let es = null;
function closeConsole() {
  if (es) { es.close(); es = null; }
  document.getElementById('console').hidden = true;
}
function conLine(cls, text) {
  const log = document.getElementById('conlog');
  const atBottom = log.scrollHeight - log.scrollTop - log.clientHeight < 30;
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = text;
  log.appendChild(div);
  if (atBottom) log.scrollTop = log.scrollHeight;
}
function openConsole(runId, title) {
  if (es) { es.close(); es = null; }
  document.getElementById('console').hidden = false;
  document.getElementById('contitle').textContent = title || ('run ' + runId);
  document.getElementById('conlog').innerHTML = '';
  const dot = document.getElementById('condot'), st = document.getElementById('constatus');
  dot.className = 'dot'; st.textContent = 'running…';
  es = new EventSource('/api/runs/' + runId + '/stream');
  es.onmessage = (m) => {
    let ev; try { ev = JSON.parse(m.data); } catch { return; }
    if (ev.t === 'reset') { document.getElementById('conlog').innerHTML = ''; return; }
    if (ev.t === 'end') {
      dot.className = 'dot ' + (ev.status === 'ok' ? 'done' : 'failed');
      st.textContent = ev.status;
      es.close(); es = null;
      render(); loadStatusBanner();
      return;
    }
    const prefix = { tool: '▸ ', result: '   → ', stderr: '⚠ ', done: '■ ', start: '● ' }[ev.t] || '  ';
    conLine(ev.t, prefix + (ev.text || ''));
  };
  es.onerror = () => { st.textContent = 'stream lost'; };
}

function taskHtml(t) {
  const cmts = (t.comments || []).map((c) =>
    `<div class="cmt ${esc(c.author)}"><span class="who">${esc(c.author)}</span><div class="body">${mdToHtml(c.body)}</div></div>`).join('');
  const src = t.source_permalink ? `<div class="src"><a href="${esc(t.source_permalink)}" target="_blank">source ↗</a></div>` : '';
  const who = esc(t.updated_by || 'me');
  const when = localTime(t.updated_at);
  const meta = `<div class="meta ${who}">updated ${when} · by ${who}</div>`;
  const spin = t.active_run ? '<span class="spin">● claude working…</span>' : '';

  const phase = t.agent_phase || 'idle';
  const pill = phase !== 'idle'
    ? `<span class="pill ${phase}">${esc(phase.replace('_',' '))}</span>` : '';
  const pr = t.pr_url ? `<div class="src">PR: ${esc(t.pr_url)}</div>` : '';
  const approveBar = phase === 'awaiting_approval'
    ? `<div class="agentbar">
         <button onclick="approve(${t.id})">Approve &amp; execute</button>
         <button onclick="cancelAgent(${t.id})">Cancel</button>
       </div>` : '';
  const busy = ['diagnosing','executing'].includes(phase)
    ? `<div class="agentbar"><span class="spin">● agent ${esc(phase)}…</span>
         <button onclick="watchTask(${t.id})">Watch</button>
         <button onclick="cancelAgent(${t.id})">Cancel</button></div>` : '';
  const dispatchBar = ['idle','done','failed'].includes(phase)
    ? `<div class="agentbar"><button onclick="handToAgent(${t.id})">Hand to agent</button></div>` : '';
  const runsBar = `<div class="agentbar"><button onclick="watchTask(${t.id})">Runs</button><span id="runs-${t.id}" class="runs"></span></div>`;

  return `<div class="task ${t.status}" data-id="${t.id}">
    <div class="row">
      <input type="checkbox" ${t.status==='done'?'checked':''} onchange="toggle(${t.id}, this.checked)">
      <div class="title">${esc(t.title)} ${spin}${pill}</div>
    </div>
    ${t.detail ? `<div>${esc(t.detail)}</div>` : ''}
    ${src}${meta}
    <div class="thread">${cmts}</div>
    ${pr}${approveBar}${busy}${dispatchBar}${runsBar}
    <form class="add" onsubmit="return comment(event, ${t.id})">
      <input type="text" name="body" placeholder="Comment, or @claude for help…" autocomplete="off">
      <button type="submit">Send</button>
    </form>
  </div>`;
}

async function render() {
  const tasks = await (await fetch('/api/tasks?status=' + status)).json();
  document.getElementById('list').innerHTML =
    tasks.length ? tasks.map(taskHtml).join('') : '<p>No tasks.</p>';
  // Re-populate any run-history lists the user has expanded (render wiped them).
  openRuns.forEach((id) => loadRuns(id));
}

// render() rebuilds #list wholesale, which destroys any comment <input> the user
// is mid-way through. The 3s auto-refresh must not yank text out from under them:
// skip the periodic render while a list input is focused or holds unsent text.
// Explicit user actions still call render() directly.
function isEditing() {
  const list = document.getElementById('list');
  if (!list) return false;
  const ae = document.activeElement;
  if (ae && list.contains(ae) && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')) return true;
  return [...list.querySelectorAll('input[type=text], textarea')].some((el) => el.value.trim() !== '');
}

async function toggle(id, done) {
  await fetch('/api/tasks/' + id, { method: 'PATCH',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ status: done ? 'done' : 'open' }) });
  render();
}

async function comment(e, id) {
  e.preventDefault();
  const input = e.target.body;
  const body = input.value.trim();
  if (!body) return false;
  const ask = /@claude\b/i.test(body);
  input.value = '';
  await fetch('/api/tasks/' + id + '/comments', { method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ author: 'me', body, ask_agent: ask }) });
  render();
  return false;
}

async function handToAgent(id) {
  const repos = await (await fetch('/api/repos')).json();
  if (!repos.length) { alert('Add a repo first (Repos link, top right).'); return; }
  const choice = prompt('Repo id to use:\n' + repos.map((r) => `${r.id}: ${r.path} (${r.default_branch})`).join('\n'), String(repos[0].id));
  if (!choice) return;
  await fetch('/api/tasks/' + id + '/dispatch', { method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ repo_id: Number(choice), mode: 'code' }) });
  render();
}

async function approve(id) {
  const edited = prompt('Approve the plan. Optionally edit it (blank = use the posted plan):', '');
  await fetch('/api/tasks/' + id + '/approve', { method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify(edited ? { plan: edited } : {}) });
  render();
}

async function cancelAgent(id) {
  await fetch('/api/tasks/' + id + '/cancel', { method: 'POST', headers: { 'content-type': 'application/json' }, body: '{}' });
  render();
}

document.querySelectorAll('.tabs button').forEach((b) => b.onclick = () => {
  status = b.dataset.status;
  document.querySelectorAll('.tabs button').forEach((x) => x.classList.remove('active'));
  b.classList.add('active');
  render();
});

render();
loadStatusBanner();
setInterval(() => { if (!isEditing()) render(); loadStatusBanner(); }, 3000);
</script>
</body>
</html>
