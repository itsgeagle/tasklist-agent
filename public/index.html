<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tasklist</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; background: Canvas; color: CanvasText; }
  header { padding: 12px 20px; border-bottom: 1px solid #8884; display: flex; gap: 16px; align-items: center; }
  h1 { font-size: 18px; margin: 0; }
  .banner { background: #c0392b; color: #fff; padding: 6px 20px; font-size: 13px; display: none; }
  main { max-width: 820px; margin: 0 auto; padding: 20px; }
  .task { border: 1px solid #8884; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
  .task.done { opacity: .55; }
  .row { display: flex; gap: 10px; align-items: flex-start; }
  .title { font-weight: 600; flex: 1; }
  .src a { font-size: 12px; color: #4a90d9; text-decoration: none; }
  .thread { margin: 10px 0 0 26px; border-left: 2px solid #8884; padding-left: 10px; }
  .cmt { margin: 6px 0; }
  .cmt .who { font-weight: 600; font-size: 12px; text-transform: uppercase; opacity: .7; }
  .cmt.agent .who { color: #27ae60; }
  form.add { margin-top: 8px; display: flex; gap: 6px; }
  input[type=text] { flex: 1; padding: 6px 8px; border: 1px solid #8886; border-radius: 6px; background: Field; color: FieldText; }
  button { padding: 6px 10px; border: 1px solid #8886; border-radius: 6px; background: ButtonFace; color: ButtonText; cursor: pointer; }
  .spin { font-size: 12px; color: #27ae60; }
  .tabs button.active { font-weight: 700; text-decoration: underline; }
  .pill { font-size: 11px; padding: 2px 6px; border-radius: 10px; border: 1px solid #8886; margin-left: 6px; }
  .pill.executing, .pill.diagnosing { color: #d68910; } .pill.done { color: #27ae60; } .pill.failed { color: #c0392b; }
  .agentbar { margin: 8px 0 0 26px; display: flex; gap: 6px; align-items: center; }
</style>
</head>
<body>
<header>
  <h1>tasklist</h1>
  <span class="tabs">
    <button data-status="open" class="active">Open</button>
    <button data-status="done">Done</button>
    <button data-status="all">All</button>
  </span>
  <span class="runjobs" style="margin-left:auto;display:flex;gap:6px;align-items:center;">
    <button id="run-ingest" onclick="runJob('ingest', this)">Pull Slack</button>
    <button id="run-digest" onclick="runJob('digest', this)">Run digest</button>
    <span id="jobstatus" style="font-size:12px;opacity:.7;"></span>
  </span>
  <a href="/repos.html" style="color:#4a90d9;font-size:13px;">Repos</a>
  <span id="usage" style="font-size:12px;opacity:.7;"></span>
</header>
<div class="banner" id="banner"></div>
<main id="list">Loading…</main>
<script>
let status = 'open';
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

async function loadStatusBanner() {
  const s = await (await fetch('/api/status')).json();
  const b = document.getElementById('banner');
  const bad = s.ingest && s.ingest.status === 'failed';
  b.style.display = bad ? 'block' : 'none';
  if (bad) b.textContent = 'Last Slack ingest failed — ' + (s.ingest.finished_at || '');
  const fmt = (r) => r ? `${r.status}${r.finished_at ? ' · ' + r.finished_at.slice(11, 16) : ''}` : '—';
  document.getElementById('jobstatus').textContent =
    `ingest: ${fmt(s.ingest)} · digest: ${fmt(s.digest)}`;
  const u = await (await fetch('/api/usage')).json();
  document.getElementById('usage').textContent = `agents: ${u.active}/${u.cap} · ${u.today} today`;
}

async function runJob(job, btn) {
  const label = btn.textContent;
  btn.disabled = true;
  btn.textContent = job === 'ingest' ? 'Pulling…' : 'Running…';
  try {
    await fetch('/api/run/' + job, { method: 'POST', headers: { 'content-type': 'application/json' }, body: '{}' });
  } catch (e) { /* status label reflects real run state on next poll */ }
  setTimeout(() => { btn.disabled = false; btn.textContent = label; loadStatusBanner(); }, 1500);
}

function taskHtml(t) {
  const cmts = (t.comments || []).map((c) =>
    `<div class="cmt ${esc(c.author)}"><span class="who">${esc(c.author)}</span> ${esc(c.body)}</div>`).join('');
  const src = t.source_permalink ? `<div class="src"><a href="${esc(t.source_permalink)}" target="_blank">source ↗</a></div>` : '';
  const spin = t.active_run ? '<span class="spin">● claude working…</span>' : '';

  const phase = t.agent_phase || 'idle';
  const pill = phase !== 'idle'
    ? `<span class="pill ${phase}">${esc(phase.replace('_',' '))}</span>` : '';
  const pr = t.pr_url ? `<div class="src">PR: ${esc(t.pr_url)}</div>` : '';
  const approveBar = phase === 'awaiting_approval'
    ? `<div class="agentbar">
         <button onclick="approve(${t.id})">Approve &amp; execute</button>
         <button onclick="cancelAgent(${t.id})">Cancel</button>
       </div>` : '';
  const busy = ['diagnosing','executing'].includes(phase)
    ? `<div class="agentbar"><span class="spin">● agent ${esc(phase)}…</span>
         <button onclick="cancelAgent(${t.id})">Cancel</button></div>` : '';
  const dispatchBar = ['idle','done','failed'].includes(phase)
    ? `<div class="agentbar"><button onclick="handToAgent(${t.id})">Hand to agent</button></div>` : '';

  return `<div class="task ${t.status}" data-id="${t.id}">
    <div class="row">
      <input type="checkbox" ${t.status==='done'?'checked':''} onchange="toggle(${t.id}, this.checked)">
      <div class="title">${esc(t.title)} ${spin}${pill}</div>
    </div>
    ${t.detail ? `<div>${esc(t.detail)}</div>` : ''}
    ${src}
    <div class="thread">${cmts}</div>
    ${pr}${approveBar}${busy}${dispatchBar}
    <form class="add" onsubmit="return comment(event, ${t.id})">
      <input type="text" name="body" placeholder="Comment, or @claude for help…" autocomplete="off">
      <button type="submit">Send</button>
    </form>
  </div>`;
}

async function render() {
  const tasks = await (await fetch('/api/tasks?status=' + status)).json();
  document.getElementById('list').innerHTML =
    tasks.length ? tasks.map(taskHtml).join('') : '<p>No tasks.</p>';
}

async function toggle(id, done) {
  await fetch('/api/tasks/' + id, { method: 'PATCH',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ status: done ? 'done' : 'open' }) });
  render();
}

async function comment(e, id) {
  e.preventDefault();
  const input = e.target.body;
  const body = input.value.trim();
  if (!body) return false;
  const ask = /@claude\b/i.test(body);
  input.value = '';
  await fetch('/api/tasks/' + id + '/comments', { method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ author: 'me', body, ask_agent: ask }) });
  render();
  return false;
}

async function handToAgent(id) {
  const repos = await (await fetch('/api/repos')).json();
  if (!repos.length) { alert('Add a repo first (Repos link, top right).'); return; }
  const choice = prompt('Repo id to use:\n' + repos.map((r) => `${r.id}: ${r.path} (${r.default_branch})`).join('\n'), String(repos[0].id));
  if (!choice) return;
  await fetch('/api/tasks/' + id + '/dispatch', { method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ repo_id: Number(choice), mode: 'code' }) });
  render();
}

async function approve(id) {
  const edited = prompt('Approve the plan. Optionally edit it (blank = use the posted plan):', '');
  await fetch('/api/tasks/' + id + '/approve', { method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify(edited ? { plan: edited } : {}) });
  render();
}

async function cancelAgent(id) {
  await fetch('/api/tasks/' + id + '/cancel', { method: 'POST', headers: { 'content-type': 'application/json' }, body: '{}' });
  render();
}

document.querySelectorAll('.tabs button').forEach((b) => b.onclick = () => {
  status = b.dataset.status;
  document.querySelectorAll('.tabs button').forEach((x) => x.classList.remove('active'));
  b.classList.add('active');
  render();
});

render();
loadStatusBanner();
setInterval(() => { render(); loadStatusBanner(); }, 3000);
</script>
</body>
</html>
